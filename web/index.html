<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIPS Wind Tunnel — Topology</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <span class="mark"></span>
          <div class="brand-text">
            <strong>FIPS Wind Tunnel</strong>
            <span class="sub">topology analysis · M6 prototype</span>
          </div>
        </div>
        <div id="run-meta" class="run-meta"></div>
        <div class="topbar-actions">
          <div class="lod-control">
            <label for="lod">resolution</label>
            <input id="lod" class="lod" type="range" min="0" max="10" value="0" />
            <span id="regime-badge" class="regime-badge">exact</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-labels" />
            <span>labels</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="toggle-links" checked />
            <span>links</span>
          </label>
          <button id="btn-fit" class="ghost" title="Fit to view">fit</button>
          <button id="btn-reheat" class="ghost" title="Re-run layout">reheat</button>
        </div>
      </header>

      <main id="stage">
        <canvas id="graph"></canvas>
        <div id="legend" class="panel legend"></div>
        <div id="coverage" class="coverage-badge"></div>
        <canvas id="minimap" class="panel minimap" width="200" height="130"></canvas>
        <aside id="inspector" class="panel inspector">
          <div class="inspector-empty">Hover or click a node</div>
        </aside>
      </main>

      <footer id="transport">
        <button id="btn-play" class="play" aria-label="play/pause">▶</button>
        <div class="clock"><span id="clock-now">0.000</span><span class="clock-sep">/</span><span id="clock-end">0.000</span><span class="clock-unit">s</span></div>
        <div class="scrub-wrap">
          <div id="wave-markers" class="wave-markers"></div>
          <input id="scrubber" class="scrubber" type="range" min="0" max="1000" value="0" />
        </div>
        <div class="speed">
          <label>speed</label>
          <select id="speed">
            <option value="0.25">0.25×</option>
            <option value="1" selected>1×</option>
            <option value="4">4×</option>
            <option value="16">16×</option>
          </select>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

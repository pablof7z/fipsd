name: M5 daemon oracle

on:
  pull_request:
    paths:
      - "crates/fips-oracle/**"
      - "crates/fips-cli/**"
      - "fixtures/m5/**"
      - "scripts/check-m5-daemon.sh"
      - ".github/workflows/oracle.yml"
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pinned-daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: jmcorgan/fips
          ref: 80c956a6fdb85dde1450969a21891c1158e43267
          path: pinned-fips
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: m5-daemon-oracle
      - name: Install pinned harness dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libclang-dev python3-yaml python3-jinja2
      - name: Build pinned Linux daemons
        run: pinned-fips/testing/scripts/build.sh --no-docker
      - name: Run pull-request or scheduled smoke
        env:
          FIPSD_M5_REPEATS: ${{ github.event_name == 'pull_request' && '1' || '3' }}
        run: scripts/check-m5-daemon.sh "$GITHUB_WORKSPACE/pinned-fips" "$RUNNER_TEMP/m5-smoke"
      - name: Run nightly Bloom calibration
        if: github.event_name != 'pull_request'
        run: |
          cargo run --quiet -p fips-cli --bin fips-wind-tunnel -- oracle run-chaos \
            fixtures/m5/chaos/bloom-storm.yaml \
            --fips-checkout "$GITHUB_WORKSPACE/pinned-fips" --repeats 1 \
            --duration-seconds 20 --output "$RUNNER_TEMP/m5-bloom"
          jq -e '([.repeats[].exit_code] | all(. == 0))' "$RUNNER_TEMP/m5-bloom/oracle-report.json"
      - name: Retain oracle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m5-daemon-oracle-${{ github.run_id }}
          path: ${{ runner.temp }}/m5-*
          if-no-files-found: ignore

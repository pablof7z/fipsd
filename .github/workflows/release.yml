name: v0.1 release

on:
  push:
    tags: ["v0.1.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install package tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Full deterministic gate
        run: scripts/check.sh
      - name: Build and verify release package
        run: scripts/package-release.sh dist/fips-wind-tunnel-0.1.0
      - name: Clean install and uninstall
        run: scripts/check-clean-install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ runner.os }}-${{ runner.arch }}
          path: dist/fips-wind-tunnel-0.1.0
          if-no-files-found: error

  attest:
    name: Attest and publish
    if: startsWith(github.ref, 'refs/tags/v0.1.')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist
      - name: Archive platform packages
        run: |
          mkdir release
          for directory in dist/package-*; do
            name="$(basename "$directory" | tr '[:upper:]' '[:lower:]')"
            tar -C "$directory" -czf "release/fips-wind-tunnel-0.1.0-${name}.tar.gz" .
          done
          sha256sum release/*.tar.gz > release/checksums.sha256
      - name: Signed build provenance
        uses: actions/attest@v4
        with:
          subject-checksums: release/checksums.sha256
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --notes-file RELEASE_NOTES.md

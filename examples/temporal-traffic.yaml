apiVersion: experiments.fips.network/v1alpha1
kind: Campaign
metadata:
  name: persistent-stream-root-change
  description: Interleaved stream segments compete with a root-change wave
seed: 20260723
engine: {modes: compact-discrete-event, deterministic: true}
scale: {nodes: 8}
topology: {generator: chain, average_degree: 2}
identities:
  initial: {distribution: uniform-128}
  arrivals:
    count: 1
    schedule: {start: 700ms, interval: 1s}
    address_policy: strictly-lower-than-current-root
    attachment: random
    attacker_budget: {mode: bounded, operations: 1, identities: 1}
transports:
  assignment: random-mixed
  profiles:
    - name: wifi
      type: wifi
      weight: 3
      bandwidth_bps: 100000000
      latency: 5ms
      jitter: 2ms
      loss_ppm: 0
      mtu_bytes: 1500
      queue_bytes: 1048576
    - name: tor
      type: tor
      weight: 1
      bandwidth_bps: 5000000
      latency: 120ms
      jitter: 30ms
      loss_ppm: 1000
      mtu_bytes: 1500
      queue_bytes: 262144
links:
  latency: 1ms
  jitter: 1ms
  bandwidth_bps: 1000000000
  loss_ppm: 0
  duplication_ppm: 0
  ordering: datagram
  mtu_bytes: 1500
  queue_bytes: 1048576
resources: {assignment: uniform}
events: []
protocol:
  variant: fips-80c956a-baseline
  parameters: {tree_announce_debounce: 500ms}
traffic:
  model: persistent-streams
  rate_bps: 1000000
  payload_bytes: 512
  parameters:
    flow_count: 3
    segments_per_stream: 8
    start_ns: 500000000
fidelity:
  protocol: semantic-exact
  serialization: executable-codec
  bloom: exact-bits
  crypto: operation-count
  billion_node_representation: not-requested
accounting:
  causal_lineage: true
  transport_overhead: true
  network_overhead: configured
  reconcile_serialized_frames: true
instrumentation:
  transition_stages: true
  control_and_useful_bytes: true
  quiescence_markers: [root, tree, data-plane]
assertions:
  - always: {condition: no_forwarding_loops}
  - reconcile: {condition: measured_bytes_equal_serialized_frames}
objectives: {maximize: [data_plane_stall_duration]}

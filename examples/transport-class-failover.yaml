apiVersion: experiments.fips.network/v1alpha1
kind: Campaign
metadata:
  name: transport-class-failover
  description: Persistent payloads cross a Wi-Fi class outage and restoration
seed: 20260723
engine: {modes: compact-discrete-event, deterministic: true}
scale: {nodes: 8}
topology: {generator: random-regular, average_degree: 4}
identities: {initial: {distribution: uniform-128}}
transports:
  assignment: random-mixed
  profiles:
    - {name: wifi, type: wifi, weight: 3, bandwidth_bps: 100000000, latency: 5ms, jitter: 2ms, loss_ppm: 0, mtu_bytes: 1500, queue_bytes: 1048576}
    - {name: tor, type: tor, weight: 1, bandwidth_bps: 5000000, latency: 120ms, jitter: 30ms, loss_ppm: 0, mtu_bytes: 1500, queue_bytes: 262144}
links:
  latency: 1ms
  jitter: 1ms
  bandwidth_bps: 1000000000
  loss_ppm: 0
  duplication_ppm: 0
  ordering: datagram
  mtu_bytes: 1500
  queue_bytes: 1048576
resources: {assignment: uniform}
events:
  - {id: wifi-down, action: fail-transport-class, target: wifi, at: 2s}
  - {id: wifi-up, action: restore-transport-class, target: wifi, at: 3s}
protocol: {variant: fips-80c956a-baseline, parameters: {tree_announce_debounce: 100ms}}
traffic:
  model: persistent-streams
  rate_bps: 100000
  payload_bytes: 512
  parameters: {flow_count: 4, segments_per_stream: 20, start_ns: 500000000}
fidelity:
  protocol: semantic-exact
  serialization: executable-codec
  bloom: exact-bits
  crypto: operation-count
  billion_node_representation: not-requested
accounting: {causal_lineage: true, reconcile_serialized_frames: true}
instrumentation: {transition_stages: true, quiescence_markers: [root, tree, data-plane]}
assertions: []
objectives: {maximize: [failover-time, useful-payload-loss]}

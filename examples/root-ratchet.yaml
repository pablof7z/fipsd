# Campaign v1alpha1 design fixture.
#
# This is the normative Campaign v1alpha1 fixture. M0 validates and normalizes
# it; execution begins with the M1 engine.
apiVersion: experiments.fips.network/v1alpha1
kind: Campaign

metadata:
  name: root-ratchet
  description: Descending-Minimum Root Cascade across topology and debounce boundaries

seed: 424242

engine:
  modes:
    values:
      - compact-discrete-event
      - cohort-hybrid
  deterministic: true

scale:
  nodes:
    values: [10, 1000, 100000, 1000000, 1000000000]

topology:
  generator:
    values:
      - chain
      - balanced-tree
      - random-regular
      - scale-free
      - clustered
  average_degree: 4

identities:
  initial:
    distribution: uniform-128
  arrivals:
    count:
      values: [1, 10, 100, 1000]
    schedule:
      interval:
        values: [10s, 1s, 501ms, 500ms, 499ms, 100ms, 10ms, 1ms, 0ms]
    address_policy: strictly-lower-than-current-root
    attachment:
      values:
        - current-root
        - random-leaf
        - highest-degree
        - articulation-point
    attacker_budget:
      mode:
        values: [free-input, operation-count, calibrated-cost, bounded]

transports:
  assignment:
    values:
      - all-udp
      - random-mixed
      - depth-correlated
      - high-latency-root-spine
      - descending-mtu-root-spine

links:
  latency:
    values: [1ms, 10ms, 100ms]
  bandwidth_bps:
    values: [1000000, 1000000000]
  loss_ppm:
    values: [0, 1000]
  ordering:
    values: [datagram, stream]
  mtu_bytes:
    values: [1280, 1500, 9000]
  queue_bytes:
    values: [65536, 1048576]
  drop_policy: tail-drop

resources:
  assignment: uniform
  node_profiles:
    - name: baseline
      cpu_units: 1000
      memory_bytes: 1073741824
      queue_bytes: 1048576
      table_entries: 100000

events:
  - id: descending-root-arrivals
    action: introduce-lower-root-identities
    parameters:
      source: identities.arrivals

adversaries:
  mode: authenticated-protocol-valid
  actions: [bounded-root-grinding, strategic-attachment]
  budgets:
    operations:
      values: [1, 1000, 1000000]
    identities:
      values: [1, 10, 1000]

protocol:
  variant: fips-80c956a-baseline
  parameters:
    tree_announce_debounce: 500ms

traffic:
  model:
    values:
      - idle
      - uniform-random
      - zipf
      - cross-min-cut
      - session-churn

fidelity:
  protocol: semantic-exact
  serialization: executable-codec
  bloom:
    values: [exact-bits, occupancy, cohort-fpr, sampled-exact]
  crypto:
    values: [operation-count, calibrated-cost, adversarial-budget]
  billion_node_representation: cohort-with-sampled-exact-regions

accounting:
  causal_lineage: true
  transport_overhead: true
  network_overhead: configured
  reconcile_serialized_frames: true

assertions:
  - eventually:
      condition: all_connected_nodes_agree_on_minimum_root
      after_input_quiescence: 30s
  - always:
      condition: no_forwarding_loops
  - always:
      condition: accepted_ancestry_is_valid
  - always:
      condition: per_peer_announcements_obey_debounce
  - eventually:
      condition: control_queues_return_to_baseline
  - eventually:
      condition: data_plane_makes_progress
  - reconcile:
      condition: measured_bytes_equal_serialized_frames
  - deterministic:
      condition: same_seed_same_event_order_and_result

objectives:
  maximize:
    - control_bytes_per_root_arrival
    - convergence_time
    - data_plane_stall_duration
    - peak_queue_bytes
    - coordinate_cache_invalidations

instrumentation:
  root_agreement_by_depth: true
  transition_stages: true
  causal_cost_ledger: true
  queue_wait: true
  control_and_useful_bytes: true
  quiescence_markers: [root, tree, bloom, lookup, data-plane]

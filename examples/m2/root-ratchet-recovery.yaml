apiVersion: experiments.fips.network/v1alpha1
kind: Campaign
metadata:
  name: root-ratchet-recovery
  description: M2 coupled Bloom, cache, lookup, resource, and useful-traffic recovery
seed: 424242
engine:
  modes: compact-discrete-event
  deterministic: true
scale:
  nodes: 12
topology:
  generator: chain
  average_degree: 2
identities:
  initial:
    distribution: uniform-128
  arrivals:
    count: 4
    schedule:
      start: 2s
      interval: 499ms
    address_policy: strictly-lower-than-current-root
    attachment: current-root
    attacker_budget:
      mode: bounded
      operations: 4
      identities: 4
transports:
  assignment: all-udp
links:
  latency: 1ms
  bandwidth_bps: 10000000
  loss_ppm: 0
  duplication_ppm: 0
  ordering: stream
  mtu_bytes: 1500
  queue_bytes: 1048576
  drop_policy: tail-drop
resources:
  assignment: heterogeneous
  node_profiles:
    - name: baseline
      cpu_units: 1000
      memory_bytes: 1073741824
      queue_bytes: 1048576
      table_entries: 1000
events:
  - id: descending-root-arrivals
    action: introduce-lower-root-identities
protocol:
  variant: fips-80c956a-baseline
  parameters:
    tree_announce_debounce: 500ms
    bloom_update_debounce: 500ms
    bloom_max_fpr_ppm: 200000
    coord_cache_entries: 8
    coord_cache_ttl: 5s
    lookup_ttl: 64
    lookup_attempts: 3
traffic:
  model: uniform-random
  rate_bps: 40960
  payload_bytes: 512
  parameters:
    flow_count: 48
fidelity:
  protocol: semantic-exact
  serialization: executable-codec
  bloom: exact-bits
  crypto: operation-count
  billion_node_representation: not-requested
accounting:
  causal_lineage: true
  transport_overhead: true
  network_overhead: configured
  reconcile_serialized_frames: true
instrumentation:
  root_agreement_by_depth: true
  transition_stages: true
  causal_cost_ledger: true
  queue_wait: true
  control_and_useful_bytes: true
  quiescence_markers: [root, tree, bloom, lookup, data-plane]
assertions:
  - eventually:
      condition: all_connected_nodes_agree_on_minimum_root
      after_input_quiescence: 30s
  - always:
      condition: no_forwarding_loops
  - eventually:
      condition: data_plane_makes_progress
  - reconcile:
      condition: measured_bytes_equal_serialized_frames
  - deterministic:
      condition: same_seed_same_event_order_and_result
objectives:
  maximize:
    - control_bytes_per_root_arrival
    - data_plane_stall_duration
    - coordinate_cache_invalidations

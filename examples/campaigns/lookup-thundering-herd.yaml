apiVersion: experiments.fips.network/v1alpha1
kind: Campaign
metadata: {name: lookup-thundering-herd}
seed: 1006
engine: {modes: compact-discrete-event, deterministic: true}
scale: {nodes: {values: [1000, 100000]}}
topology: {generator: scale-free, average_degree: 6}
identities: {initial: {distribution: uniform-128}}
transports:
  assignment: random-mixed
  profiles:
    - {name: wifi, type: wifi, weight: 4, bandwidth_bps: 100000000, latency: 5ms, jitter: 2ms, loss_ppm: 0, mtu_bytes: 1500, queue_bytes: 1048576}
    - {name: tor, type: tor, weight: 1, bandwidth_bps: 5000000, latency: 120ms, jitter: 30ms, loss_ppm: 1000, mtu_bytes: 1500, queue_bytes: 262144}
resources: {assignment: hub-constrained, node_profiles: [{name: hub, cpu_units: 100, memory_bytes: 268435456, queue_bytes: 65536, table_entries: 1000}]}
events:
  - {id: global-expiry, action: expire-coordinate-cache, at: 10s}
  - {id: lookup-herd, action: simultaneous-lookups, at: 10s, parameters: {count: 1000}}
traffic:
  model: uniform-random
  rate_bps: 100000000
  payload_bytes: 512
  parameters: {flow_count: 1000, start_ns: 500000000}
fidelity: {protocol: semantic-exact, serialization: executable-codec, bloom: exact-bits, billion_node_representation: not-requested}
instrumentation: {transition_stages: true, queue_wait: true, state_tables: true, quiescence_markers: [root, tree, lookup, data-plane]}
assertions: [{eventually: {condition: lookup-queues-drain, within: 60s}}]
objectives: {maximize: [lookup-fanout, queue-bytes, retry-count]}

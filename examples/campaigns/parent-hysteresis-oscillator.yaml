apiVersion: experiments.fips.network/v1alpha1
kind: Campaign
metadata: {name: parent-hysteresis-oscillator}
seed: 1007
engine: {modes: compact-discrete-event, deterministic: true}
scale: {nodes: 20}
topology: {generator: random-regular, average_degree: 4}
identities: {initial: {distribution: uniform-128}}
transports: {assignment: all-udp}
links: {latency: {values: [1ms, 10ms]}, loss_ppm: {values: [0, 1000]}, ordering: datagram}
events:
  - action: alternate-parent-quality
    at: {values: [1999ms, 2s, 2001ms]}
    parameters: {cycles: 4, interval: 250ms, preferred_cost_ppm: 1000000, degraded_cost_ppm: 6000000}
traffic: {model: idle}
protocol:
  variant: fips-80c956a-baseline
  parameters:
    parent_hold_down: {values: [0s, 1s]}
    parent_hysteresis_ppm: {values: [0, 100000]}
fidelity: {protocol: semantic-exact, serialization: executable-codec, billion_node_representation: not-requested}
instrumentation: {transition_stages: true, causal_cost_ledger: true}
assertions: [{always: {condition: mandatory-better-root-switch-is-not-suppressed}}]
objectives: {maximize: [parent-switches, dampened-duration]}
